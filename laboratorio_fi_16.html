*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5ed;color:#1a1a1a;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:0 1.5rem 3rem}

.header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 0 1rem;border-bottom:1px solid #e0e0d6}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;border-radius:9px;background:#304a75;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#f5f5ed;flex-shrink:0}
.h-title{font-size:18px;font-weight:600;color:#1a1a1a}
.h-sub{font-size:12px;color:#888;margin-top:2px}
.h-status{display:flex;align-items:center;gap:6px;margin-top:3px}
.dot{width:8px;height:8px;border-radius:50%;background:#bbb;flex-shrink:0}
.dot.ok{background:#4a9e6f}.dot.err{background:#c94040}.dot.spin{background:#c8850a;animation:bl 1s infinite}

.stext{font-size:11px;color:#888}
.btn{padding:8px 20px;border:none;border-radius:20px;background:#304a75;font-size:13px;font-weight:500;cursor:pointer;color:#f5f5ed}

.flabel{font-size:12px;color:#888;white-space:nowrap}
.sel{font-size:12px;padding:8px 10px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#1a1a1a;outline:none;cursor:pointer}

.panel{display:none;padding:1.25rem 0}.panel.on{display:block}

.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:1.25rem}

table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}

/* ── JWT / BIGQUERY AUTH ── */
function b64url(str){ return btoa(str).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlU8(u8){ var b=''; u8.forEach(function(x){b+=String.fromCharCode(x);}); return b64url(b); }

async function getToken(){
  var now=Math.floor(Date.now()/1000);
  var header=b64url(JSON.stringify({alg:'RS256',typ:'JWT'}));
  var claim=b64url(JSON.stringify({
    iss:SA_EMAIL, scope:'https://www.googleapis.com/auth/bigquery',
    aud:'https://oauth2.googleapis.com/token', iat:now, exp:now+3600
  }));
  var msg=header+'.'+claim;
  /* import key */
  var pemBody=SA_KEY.replace(/-----[^-]+-----/g,'').replace(/\s/g,'');
  var der=Uint8Array.from(atob(pemBody),function(c){return c.charCodeAt(0);});
  var key=await crypto.subtle.importKey('pkcs8',der,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  var sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',key,new TextEncoder().encode(msg));
  var jwt=msg+'.'+b64urlU8(new Uint8Array(sig));
  var res=await fetch('https://oauth2.googleapis.com/token',{
    method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion='+jwt
  });
  var j=await res.json();
  if(!j.access_token) throw new Error('Auth error: '+JSON.stringify(j));
  return j.access_token;
}

async function bqQuery(token, sql){
  var res=await fetch('https://bigquery.googleapis.com/bigquery/v2/projects/'+PROJECT+'/queries',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({query:sql,useLegacySql:false,timeoutMs:30000,maxResults:10000})
  });
  var j=await res.json();
  if(j.error) throw new Error(j.error.message);
  /* parse rows */
  var fields=(j.schema&&j.schema.fields)||[];
  return (j.rows||[]).map(function(row){
    var obj={};
    fields.forEach(function(f,i){ obj[f.name]=row.f[i].v; });
    return obj;
  });
}

async function cargar(){

/* ── HELPERS ── */
function n(v){return parseFloat(v)||0;}
function fmtD(s){return s?String(s).split('T')[0]:'—';}
function pct(a,b){return b>0?Math.round(a/b*100):0;}
function sem(v,g,w){return v>=g?'ok':v>=w?'warn':'danger';}
function sembl(v,g,w){var s=sem(v,g,w);return s==='ok'?'green':s==='warn'?'gold':'red';}

function getTec(r){
  var t1=(r.esti_esti_tecnica_name||'').trim();
  var t2=(r.prepa_end_ovo_tec_fec_name||'').trim();
  if(t1) return t1;
  if(t2) return t2;
  return '';
}

function filtrarTec(data, tec){
  tec=tec||'todos';
  return data.filter(function(r){
    var t=getTec(r);
    if(tec==='todos') return TEC.indexOf(t)>=0;
    return t===tec;
  });
}

/* ── SERIES MENSUALES ── */
function porMes(data, numFn, denFn){
  var g={};
  data.forEach(function(r){
    var f=String(r.fecha||''); if(!f||f==='null') return;
    var m=parseInt(f.substr(5,2),10)-1; if(isNaN(m)) return;
    if(!g[m]) g[m]={a:0,b:0};
    g[m].a+=numFn(r); g[m].b+=denFn(r);
  });
  var labels=[],vals=[];
  Object.keys(g).sort(function(a,b){return+a-+b;}).forEach(function(m){
    labels.push(MESES[+m]);
    vals.push(g[m].b>0?Math.round(g[m].a/g[m].b*100):null);
  });
  return {labels:labels,vals:vals};
}

function porMesCnt(data,filterFn){
  var g={};
  data.forEach(function(r){
    if(filterFn&&!filterFn(r)) return;
    var f=String(r.fecha||''); if(!f||f==='null') return;
    var m=parseInt(f.substr(5,2),10)-1; if(isNaN(m)) return;
    g[m]=(g[m]||0)+1;
  });
  var labels=[],vals=[];
  Object.keys(g).sort(function(a,b){return+a-+b;}).forEach(function(m){
    labels.push(MESES[+m]); vals.push(g[m]);
  });
  return {labels:labels,vals:vals};
}

      {label:label1,data:vals1,borderColor:NAVY,borderWidth:2,pointBorderColor:NAVY,
       pointBackgroundColor:'#fff',pointRadius:4,pointHoverRadius:6,tension:0.1,spanGaps:true},
      {label:label2,data:vals2,borderColor:TEAL,borderWidth:2,pointBorderColor:TEAL,
       pointBackgroundColor:'#fff',pointRadius:4,pointHoverRadius:6,tension:0.1,spanGaps:true,borderDash:[4,3]}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#fff',borderColor:'#ddd',borderWidth:1,titleColor:'#333',bodyColor:'#555',
          callbacks:{label:function(c){return ' '+c.dataset.label+': '+c.parsed.y+'%';}}}
      },
      scales:{
        x:{grid:{color:'#f0f0e8'},ticks:{font:{size:11},color:'#999'}},
        y:{grid:{color:'#f0f0e8'},min:0,max:100,ticks:{font:{size:11},color:'#999',callback:function(v){return v+'%';}}}
      }
    }
  });
}

function barChart(id,labels,vals,color){
  killChart(id);
  var ctx=document.getElementById(id); if(!ctx) return;
  CHS[id]=new Chart(ctx,{
    type:'bar',
    data:{labels:labels,datasets:[{
      data:vals,backgroundColor:(color||TEAL)+'bb',borderColor:color||TEAL,borderWidth:1,borderRadius:3
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:'#fff',borderColor:'#ddd',borderWidth:1,titleColor:'#333',bodyColor:'#555'}},
      scales:{
        x:{grid:{color:'#f0f0e8'},ticks:{font:{size:11},color:'#999'}},
        y:{grid:{color:'#f0f0e8'},ticks:{font:{size:11},color:'#999'},beginAtZero:true}
      }
    }
  });
}

/* ── KPI CARD ── */
function kcard(label,val,unit,sub,bl,bp,bc){
  bl=bl||''; bp=bp===undefined?-1:bp; bc=bc||'navy';
  return '<div class="kcard'+(bl?' '+bl:'')+'">'+
    '<div class="klabel">'+label+'</div>'+
    '<div class="kval">'+val+(unit?'<span class="kunit">'+unit+'</span>':'')+'</div>'+
    (sub?'<div class="ksub">'+sub+'</div>':'')+
    (bp>=0?'<div class="kbar"><div class="kbarfill '+bc+'" style="width:'+bp+'%"></div></div>':'')+
    '</div>';
}

/* ── CHIPS ── */
function chipsHTML(activa){
  var opts=[['todos','Todos'],['FIV Clásica','FIV Clásica'],['ICSI','ICSI'],['MIXTA (FIV / ICSI)','Mixta']];
  return '<div class="chips">'+opts.map(function(o){
    return '<button class="chip'+(activa===o[0]?' on':'')+'" onclick="setTec(\''+o[0]+'\')">'+o[1]+'</button>';
  }).join('')+'</div>';
}

function setTec(t){
  tecActiva=t;
  document.querySelectorAll('.chip').forEach(function(c){
    var map={'Todos':'todos','FIV Clásica':'FIV Clásica','ICSI':'ICSI','Mixta':'MIXTA (FIV / ICSI)'};
    c.classList.toggle('on', map[c.textContent.trim()]===t);
  });
  var fec=filtrarTec(DATA_LAB,tecActiva);
  var s=porMes(fec,function(r){return n(r.ovo_fec_2pn);},function(r){return n(r.ovo_mii);});
  lineChart('ch-fec',s.labels,s.vals,tecActiva==='ICSI'?TEAL:NAVY);
}

/* ── RENDER LAB ── */
function renderLab(){
  var data=DATA_LAB;
  if(!data.length){
    document.getElementById('lab-content').innerHTML='<div class="empty">Sin datos</div>';
    return;
  }
  var dataFec=filtrarTec(data,'todos');

  /* totales */
  var totOvo=0,totMII=0,totFec=0,totBlasto=0,totTrans=0,totCong=0,cntDGP=0;
  data.forEach(function(r){
    totOvo+=n(r.ovo_tt); totBlasto+=n(r.blasto_tt);
    totTrans+=n(r.embri_trans); totCong+=n(r.embri_cong);
    var dgp=String(r.dgp||'').toLowerCase();
    if(dgp==='true'||dgp==='1') cntDGP++;
    totMII+=n(r.ovo_mii); /* madurez usa todo */
  });
  var totFecAll=0, totMIIfec=0;
  dataFec.forEach(function(r){ totFecAll+=n(r.ovo_fec_2pn); totMIIfec+=n(r.ovo_mii); });

  /* series lab */
  var sMad   =porMes(data,   function(r){return n(r.ovo_mii);},    function(r){return n(r.ovo_tt);});
  var sFec   =porMes(dataFec,function(r){return n(r.ovo_fec_2pn);},function(r){return n(r.ovo_mii);});
  var sBlasto=porMes(dataFec,function(r){return n(r.blasto_tt);},  function(r){return n(r.ovo_fec_2pn);});
  var sBcal  =porMes(data,   function(r){return n(r.embri_trans)+n(r.embri_cong);},function(r){return n(r.blasto_tt);});
  var sBiop  =porMesCnt(data,function(r){var d=String(r.dgp||'').toLowerCase();return d==='true'||d==='1';});

  var tMad  =pct(totMII,totOvo);
  var tFec  =pct(totFecAll,totMIIfec);
  var tBlasto=pct(totBlasto,totFecAll);
  var tBcal =pct(totTrans+totCong,totBlasto);

  /* series embarazo desde Pruebas Embarazo */
  var gCrio={}, gFiv={};
  DATA_PRUEBAS.forEach(function(r){
    var f=String(r.fecha||''); if(!f||f==='null') return;
    var m=parseInt(f.substr(5,2),10)-1; if(isNaN(m)) return;
    var pos=r.resultado==='Positivo'?1:0;
    if(r.tip_tra_name==='Prep. Endometrial'){
      if(!gCrio[m]) gCrio[m]={p:0,d:0};
      gCrio[m].p+=pos; gCrio[m].d++;
    } else if(r.tip_tra_name==='FIV Estimulación'){
      if(!gFiv[m]) gFiv[m]={p:0,d:0};
      gFiv[m].p+=pos; gFiv[m].d++;
    }
  });

  /* unir meses de ambas series */
  var mesesSet={};
  Object.keys(gCrio).forEach(function(m){mesesSet[m]=1;});
  Object.keys(gFiv).forEach(function(m){mesesSet[m]=1;});
  var allMeses=Object.keys(mesesSet).sort(function(a,b){return+a-+b;});
  var sEmbaLabels=allMeses.map(function(m){return MESES[+m];});
  var sEmbaCrio=allMeses.map(function(m){var g=gCrio[m];return g&&g.d>0?Math.round(g.p/g.d*100):null;});
  var sEmbaFiv=allMeses.map(function(m){var g=gFiv[m];return g&&g.d>0?Math.round(g.p/g.d*100):null;});

  /* KPI embarazo global */
  var crioPosT=0,crioDenT=0,fivPosT=0,fivDenT=0;
  DATA_PRUEBAS.forEach(function(r){
    var pos=r.resultado==='Positivo'?1:0;
    if(r.tip_tra_name==='Prep. Endometrial'){crioPosT+=pos;crioDenT++;}
    else if(r.tip_tra_name==='FIV Estimulación'){fivPosT+=pos;fivDenT++;}
  });
  var tEmbaCrio=crioDenT>0?pct(crioPosT,crioDenT):null;
  var tEmbaFiv=fivDenT>0?pct(fivPosT,fivDenT):null;

  /* html */
  var html='';
  html+='<div class="kgrid">';
  html+=kcard('Ciclos FIV',data.length,'','total registros','navy');
  html+=kcard('Tasa madurez',tMad,'%',totMII+'/'+totOvo+' ovocitos',sembl(tMad,75,60),tMad,sem(tMad,75,60));
  html+=kcard('Fecundaci&oacute;n',tFec,'%',totFecAll+'/'+totMIIfec+' 2PN',sembl(tFec,70,55),tFec,sem(tFec,70,55));
  html+=kcard('Tasa blastos',tBlasto,'%',totBlasto+'/'+totFecAll+' fec.',sembl(tBlasto,50,35),tBlasto,sem(tBlasto,50,35));
  html+=kcard('Blastos buena calidad',tBcal,'%',(totTrans+totCong)+'/'+totBlasto,sembl(tBcal,60,45),tBcal,sem(tBcal,60,45));
  html+=kcard('Emb. biopsiados',cntDGP,'','de '+data.length+' ciclos','teal');
  if(tEmbaCrio!==null) html+=kcard('Emb. cri&oacute;',tEmbaCrio,'%',crioPosT+'/'+crioDenT+' transf.',sembl(tEmbaCrio,50,35),tEmbaCrio,sem(tEmbaCrio,50,35));
  if(tEmbaFiv!==null)  html+=kcard('Emb. FIV estim.',tEmbaFiv,'%',fivPosT+'/'+fivDenT+' transf.',sembl(tEmbaFiv,40,25),tEmbaFiv,sem(tEmbaFiv,40,25));
  html+='</div>';

  html+='<div class="cgrid">';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Tasa madurez</span></div><div class="cwrap"><canvas id="ch-mad"></canvas></div></div>';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Fecundaci&oacute;n por t&eacute;cnica</span>'+chipsHTML(tecActiva)+'</div><div class="cwrap"><canvas id="ch-fec"></canvas></div></div>';
  html+='</div>';
  html+='<div class="cgrid">';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Tasa blastos</span></div><div class="cwrap"><canvas id="ch-blasto"></canvas></div></div>';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Blastos buena calidad</span></div><div class="cwrap"><canvas id="ch-bcal"></canvas></div></div>';
  html+='</div>';
  html+='<div class="cgrid">';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Embriones biopsiados (DGP)</span></div><div class="cwrap"><canvas id="ch-biop"></canvas></div></div>';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Tasa de embarazo &mdash; FIV estimulaci&oacute;n</span></div><div class="cwrap"><canvas id="ch-emba-fiv"></canvas></div></div>';
  html+='</div>';
  html+='<div class="cgrid">';
  html+='<div class="ccard"><div class="chead"><span class="ctitle">Tasa de embarazo &mdash; Cri&oacute;transferencia</span></div><div class="cwrap"><canvas id="ch-emba-crio"></canvas></div></div>';
  html+='<div></div>';
  html+='</div>';

  html+='<div class="stitle">Detalle de ciclos</div>';
  html+='<div class="twrap"><table><thead><tr>'+
    '<th>Paciente</th><th>Fecha</th><th>Cl&iacute;nica</th><th>T&eacute;cnica</th>'+
    '<th>Ovo</th><th>MII</th><th>2PN</th><th>Blasto</th><th>Trans.</th><th>Cong.</th><th>DGP</th>'+
    '</tr></thead><tbody>';
  data.slice(0,50).forEach(function(r){
    var tec=getTec(r)||'—';
    var dgp=String(r.dgp||'').toLowerCase()==='true'||String(r.dgp||'')==='1';
    html+='<tr>'+
      '<td>'+(r.his_nom||'—')+'</td>'+
      '<td>'+fmtD(r.fecha)+'</td>'+
      '<td>'+(r.del_name||'—')+'</td>'+
      '<td style="font-size:11px">'+tec+'</td>'+
      '<td>'+(r.ovo_tt||'—')+'</td><td>'+(r.ovo_mii||'—')+'</td>'+
      '<td>'+(r.ovo_fec_2pn||'—')+'</td><td>'+(r.blasto_tt||'—')+'</td>'+
      '<td>'+(r.embri_trans||'—')+'</td><td>'+(r.embri_cong||'—')+'</td>'+
      '<td><span class="badge '+(dgp?'info':'neutral')+'">'+(dgp?'Sí':'No')+'</span></td>'+
      '</tr>';
  });
  html+='</tbody></table></div>';
  if(data.length>50) html+='<div style="font-size:11px;color:#aaa;text-align:right;margin-top:4px">Mostrando 50 de '+data.length+'</div>';

  document.getElementById('lab-content').innerHTML=html;
  setTimeout(function(){
    lineChart('ch-mad',   sMad.labels,   sMad.vals,   NAVY);
    lineChart('ch-fec',   sFec.labels,   sFec.vals,   NAVY);
    lineChart('ch-blasto',sBlasto.labels,sBlasto.vals,NAVY);
    lineChart('ch-bcal',  sBcal.labels,  sBcal.vals,  TEAL);
    barChart( 'ch-biop',      sBiop.labels,   sBiop.vals,   TEAL);
    if(sEmbaCrio.filter(function(v){return v!==null;}).length)  lineChart('ch-emba-crio', sEmbaLabels, sEmbaCrio, NAVY);
    if(sEmbaFiv.filter(function(v){return v!==null;}).length)   lineChart('ch-emba-fiv',  sEmbaLabels, sEmbaFiv,  TEAL);
  },50);
}

/* ── RENDER BANCO ── */
function renderBanco(){
  var data=DATA_BANCO;
  if(!data.length){document.getElementById('banco-content').innerHTML='<div class="empty">Sin datos de banco</div>';return;}
  var today=new Date();
  var venc=0,prox=0,vig=0;
  data.forEach(function(r){
    if(!r.fec_renova||r.fec_renova==='null') return;
    var d=Math.floor((new Date(r.fec_renova)-today)/864e5);
    if(d<0) venc++; else if(d<=90) prox++; else vig++;
  });
  var byTp={},byDel={};
  data.forEach(function(r){
    var t=r.tp_name||'N/D'; byTp[t]=(byTp[t]||0)+1;
    var d=r.del_name||'N/D'; byDel[d]=(byDel[d]||0)+1;
  });
  function brows(obj,cls){
    var max=Math.max.apply(null,Object.values(obj).concat(1));
    return Object.entries(obj).sort(function(a,b){return b[1]-a[1];}).map(function(e){
      return '<div class="brow"><span class="blbl" title="'+e[0]+'">'+e[0]+'</span>'+
        '<div class="btrack"><div class="bfill '+(cls||'')+'" style="width:'+Math.round(e[1]/max*100)+'%"></div></div>'+
        '<span class="bcnt">'+e[1]+'</span></div>';
    }).join('');
  }
  var page=bancoPage,sliced=data.slice((page-1)*PG,page*PG),totalPages=Math.max(1,Math.ceil(data.length/PG));
  var html='';
  html+='<div class="kgrid">';
  html+=kcard('Total',data.length,'','muestras en banco','navy');
  html+=kcard('Vencidas',venc,'','renovaci\u00f3n expirada','red',pct(venc,data.length),'danger');
  html+=kcard('Pr\u00f3ximas a vencer',prox,'','en 90 d\u00edas','gold',pct(prox,data.length),'warn');
  html+=kcard('Vigentes',vig,'','sin alerta','green',pct(vig,data.length),'ok');
  html+='</div>';
  if(venc>0||prox>0) html+='<div class="balert"><div>&#9888;</div><div><strong>'+venc+' vencidas</strong> y <strong>'+prox+' pr\u00f3ximas.</strong> Contactar pacientes para renovaci\u00f3n.</div></div>';
  html+='<div class="bgrid2">';
  html+='<div class="ccard"><div class="ctitle" style="margin-bottom:.875rem">Por tipo de muestra</div>'+brows(byTp,'teal')+'</div>';
  html+='<div class="ccard"><div class="ctitle" style="margin-bottom:.875rem">Por cl\u00ednica</div>'+brows(byDel,'')+'</div>';
  html+='</div>';
  html+='<div class="stitle">Detalle del banco</div>';
  html+='<div class="twrap"><table><thead><tr>'+
    '<th>Paciente</th><th>Tipo</th><th>Cl\u00ednica</th><th>Entrada</th><th>Renovaci\u00f3n</th><th>Estado</th>'+
    '</tr></thead><tbody>';
  sliced.forEach(function(r){
    var fR=r.fec_renova&&r.fec_renova!=='null'?new Date(r.fec_renova):null;
    var d=fR?Math.floor((fR-today)/864e5):null;
    var cls,lbl;
    if(d===null){cls='neutral';lbl='Sin fecha';}
    else if(d<0){cls='danger';lbl='Vencida';}
    else if(d<=90){cls='warn';lbl=d+'d';}
    else{cls='ok';lbl='Vigente';}
    html+='<tr>'+
      '<td>'+(r.his_nom||'—')+'</td><td>'+(r.tp_name||'—')+'</td>'+
      '<td>'+(r.del_name||'—')+'</td><td>'+fmtD(r.fec_entra)+'</td>'+
      '<td>'+fmtD(r.fec_renova)+'</td>'+
      '<td><span class="badge '+cls+'">'+lbl+'</span></td></tr>';
  });
  html+='</tbody></table></div>';
  html+='<div class="pgn">'+
    '<button onclick="bancoPage=Math.max(1,bancoPage-1);renderBanco()" '+(page<=1?'disabled':'')+'>&#8249; Anterior</button>'+
    '<span>P\u00e1g. '+page+' de '+totalPages+' &middot; '+data.length+' muestras</span>'+
    '<button onclick="bancoPage=Math.min('+totalPages+',bancoPage+1);renderBanco()" '+(page>=totalPages?'disabled':'')+'>Siguiente &#8250;</button>'+
    '</div>';
  document.getElementById('banco-content').innerHTML=html;
}
</script>
</body>
</html>
